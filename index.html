<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 Grand Final Bingo</title>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #00ffff;
            --bg-start: #0f0c20;
            --bg-end: #2b1055;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: #44337a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0 0 5px 0;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            margin: 0;
            color: var(--secondary);
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        .grid-container {
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1 / 1;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            word-wrap: break-word;
            hyphens: auto;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 255, 255, 0.2);
        }

        .cell.checked {
            background: rgba(255, 0, 127, 0.35);
            border-color: var(--primary);
            color: #ffccf2;
            text-decoration: line-through;
            transform: scale(0.96);
            box-shadow: inset 0 0 12px rgba(255, 0, 127, 0.6);
        }

        .cell.free {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--secondary);
            color: #e0ffff;
            font-weight: 700;
        }

        .cell.free.checked {
            background: rgba(255, 0, 127, 0.4);
            border-color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #e00070;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(255, 0, 127, 0.5);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            box-shadow: 0 4px 10px rgba(0, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 6px 15px rgba(0, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .grid {
                gap: 6px;
            }
            .cell {
                font-size: 0.72rem;
                padding: 4px;
                border-radius: 6px;
                border-width: 1px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Eurovision 2026</h1>
        <div class="subtitle">Grand Final Live Bingo</div>
    </header>

    <div class="grid-container">
        <div class="grid" id="bingo-grid"></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="generateCard()">🔀 New Card</button>
        <button class="btn btn-secondary" onclick="clearCard()">🧹 Clear Marks</button>
    </div>

    <script>
        const prompts = [
            "Wind machine activated", 
            "Greece & Cyprus swap 12pts", 
            "Mid-song costume change",
            "Performer in sequins", 
            "\"Thank you, Vienna!\"", 
            "Pyrotechnics / fire cannons",
            "Shirtless performer", 
            "Fake snow or fog", 
            "Awkward host joke",
            "Exaggerated camera zoom", 
            "Performer winks at camera", 
            "Ethnic instrument used",
            "Song NOT in English", 
            "Country gets Nul Points", 
            "Fan wearing face paint",
            "Dramatic key change", 
            "Performer lies on floor", 
            "Host changes outfit",
            "Strobe lights or lasers", 
            "Screaming / whistle note", 
            "Spontaneous rap segment",
            "Voting link delay glitch", 
            "Green-room tears", 
            "\"Thank you Europe!\"",
            "Crowd singing along",
            "Prop falls over",
            "Sparkler curtains",
            "Presenter talks over postcard"
        ];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function generateCard() {
            const shuffled = shuffle([...prompts]);
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = ''; 

            let promptIndex = 0;

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (i === 12) {
                    cell.classList.add('free');
                    cell.innerHTML = '✨<br>FREE SPACE';
                } else {
                    cell.textContent = shuffled[promptIndex];
                    promptIndex++;
                }

                cell.addEventListener('click', () => cell.classList.toggle('checked'));
                grid.appendChild(cell);
            }
        }

        function clearCard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('checked'));
        }

        // Initialize grid on launch
        window.onload = generateCard;
    </script>
</body>
</html>
